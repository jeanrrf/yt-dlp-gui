<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>YDL GUI</title>
  </head>

  <body>
    <div id="app">
      <div id="loading-screen">
        <svg class="spinner" viewBox="0 0 50 50">
          <circle
            cx="25"
            cy="25"
            r="20"
            fill="none"
            stroke-width="4"
            stroke-linecap="round"
          />
        </svg>
      </div>
    </div>
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition:
          opacity 0.2s,
          background 0.2s;
        z-index: 9999;
      }
      #loading-screen.dark {
        background: #1e1e1e;
      }
      #loading-screen .spinner {
        width: 36px;
        height: 36px;
        animation: spin 0.8s linear infinite;
      }
      #loading-screen .spinner circle {
        stroke: #999;
        stroke-dasharray: 90, 150;
        stroke-dashoffset: 0;
      }
      #loading-screen.dark .spinner circle {
        stroke: #555;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script>
      // 匹配明暗模式
      (() => {
        try {
          const raw = localStorage.getItem("setting");
          const mode = raw ? JSON.parse(raw).themeMode : "auto";
          const isDark =
            mode === "dark" ||
            (mode === "auto" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) {
            document.getElementById("loading-screen").classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
